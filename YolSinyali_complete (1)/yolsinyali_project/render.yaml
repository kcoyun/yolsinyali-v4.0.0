services:
  - type: web
    name: yolsinyali
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT server:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER_URL
        sync: false   # Deploy sonrası kendiniz gireceksiniz
    healthCheckPath: /ping
